model:
  name_or_path: google/byt5-small
  use_fast: true
  max_source_length: 128
  max_target_length: 128

data:
  task_prefix: "translate gloss to chinese:"
  include_source_tags: true
  max_synthetic_ratio: 1.0
  synthetic_paths: []

train:
  output_dir: ./checkpoints/plm_byt5_small
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  num_train_epochs: 10
  logging_steps: 20
  save_total_limit: 2
  evaluation_strategy: epoch
  save_strategy: epoch
  load_best_model_at_end: true
  metric_for_best_model: bleu4
  greater_is_better: true
  generation_num_beams: 4
  fp16: false
  seed: 42
  report_to: []
  semantic_label_smoothing:
    enabled: true
    smoothing: 0.1
    tokenizer_mode: jieba
    top_k: 4
    min_similarity: 0.5