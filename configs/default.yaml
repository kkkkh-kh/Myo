model:
  gloss_vocab_size: 4000
  zh_vocab_size: 8000
  embed_dim: 128
  hidden_dim: 256
  num_layers: 2
  dropout: 0.3

encoder:
  use_sen: true
  sen_reduction: 16
  use_transformer: true
  transformer_layers: 2
  transformer_heads: 4
  transformer_dropout: 0.1

train:
  batch_size: 64
  learning_rate: 3.0e-4
  epochs: 50
  teacher_forcing_ratio_start: 1.0
  teacher_forcing_ratio_end: 0.5
  teacher_forcing_decay_epochs: 12
  clip_grad_norm: 1.0
  label_smoothing: 0.05
  validation_sample_size: 5
  early_stopping_patience: 5
  qat_enabled: false

noise_augment:
  enabled: true
  p_del: 0.05
  p_sub: 0.05
  p_ins: 0.03
  p_rep: 0.03
  warmup_ratio: 0.2

distillation:
  enabled: true
  teacher_path: ./checkpoints/best_model.pt
  student_init: hot_start
  alpha: 0.5
  temperature: 4.0
  epochs: 20
  lr: 1.0e-5
  save_path: ./checkpoints/distilled_model.pt

data:
  zh_tokenizer: char
  max_gloss_len: 32
  max_zh_len: 48
  train_split: 0.9
  val_split: 0.05
  test_split: 0.05

deploy:
  quantization: int8
  max_seq_len: 32
  memory_limit_mb: 60
  beam_size: 1
  use_distilled: true
