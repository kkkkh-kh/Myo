model:
  gloss_vocab_size: 4000
  zh_vocab_size: 8000
  embed_dim: 128
  hidden_dim: 256
  num_layers: 2
  dropout: 0.3

train:
  batch_size: 256
  learning_rate: 3.0e-4
  epochs: 50
  teacher_forcing_ratio_start: 1.0
  teacher_forcing_ratio_end: 0.5
  teacher_forcing_decay_epochs: 20
  clip_grad_norm: 1.0
  label_smoothing: 0.1
  early_stopping_patience: 5
  qat_enabled: true

data:
  max_gloss_len: 32
  max_zh_len: 48
  train_split: 0.9
  val_split: 0.05
  test_split: 0.05

deploy:
  quantization: int8
  max_seq_len: 32
  memory_limit_mb: 60
  beam_size: 1
