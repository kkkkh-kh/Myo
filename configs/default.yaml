model:
  gloss_vocab_size: 4000
  zh_vocab_size: 8000
  embed_dim: 128
  hidden_dim: 256
  num_layers: 2
  dropout: 0.3
  use_word_order_attention: true
  max_relative_position: 64
  use_order_guidance: true
  guidance_lambda_init: 1.0
  guidance_decay_ratio: 0.3

encoder:
  use_sen: true
  sen_reduction: 16
  use_transformer: true
  transformer_layers: 2
  transformer_heads: 4
  transformer_dropout: 0.1

train:
  batch_size: 64
  learning_rate: 3.0e-4
  epochs: 50
  teacher_forcing_ratio_start: 1.0
  teacher_forcing_ratio_end: 0.5
  teacher_forcing_decay_epochs: 12
  clip_grad_norm: 1.0
  label_smoothing: 0.05
  validation_sample_size: 5
  early_stopping_patience: 5
  early_stopping_min_delta: 0.0
  resume_from: null
  reuse_checkpoint_vocab: false
  force_include_numeric_tokens: true
  min_numeric_token_frequency: 1
  max_forced_numeric_tokens: 512
  qat_enabled: false

noise_augment:
  enabled: true
  p_del: 0.05
  p_sub: 0.05
  p_ins: 0.03
  p_rep: 0.03
  warmup_ratio: 0.2

distillation:
  enabled: true
  teacher_path: ./checkpoints/best_model.pt
  student_init: hot_start
  alpha: 0.5
  temperature: 4.0
  epochs: 20
  lr: 1.0e-5
  save_path: ./checkpoints/distilled_model.pt

data:
  zh_tokenizer: char
  max_gloss_len: 32
  max_zh_len: 48
  train_split: 0.9
  val_split: 0.05
  test_split: 0.05

deploy:
  quantization: int8
  max_seq_len: 32
  memory_limit_mb: 60
  beam_size: 1
  use_distilled: true

word_order_augment:
  enabled: true
  augment_ratio: 4.0
  seed: 42
  strategies:
    - component_swap
    - temporal_shift
    - negation_shift
    - subsequence_sampling
    - backtrans_sim
    - synonym_replace
  time_tokens:
    - 昨天
    - 今天
    - 明天
    - 后天
    - 前天
    - 上午
    - 下午
    - 晚上
    - 早上
    - 中午
    - 刚才
    - 现在
    - 以前
    - 以后
    - 最近
    - 去年
    - 今年
    - 明年
    - 上周
    - 下周
  neg_tokens:
    - 不
    - 没
    - 没有
    - 别
    - 不要
    - 未
    - 勿
  synonym_dict:
    买: 购买
    购买: 买
    去: 前往
    前往: 去
    看: 查看
    查看: 看

word_order_loss:
  alpha_mono: 0.1
  alpha_order: 0.05
  warmup_epochs: 10

postprocess:
  enabled: true
  enabled_rules:
    - temporal_reorder
    - negation_reorder
    - measure_word_insert
    - dedup
  confidence_threshold: 0.8
